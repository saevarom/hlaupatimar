services:
  - type: web
    name: hlaupatimar-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn hlaupatimar.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    healthCheckPath: /api/races/race-types
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: hlaupatimar-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: "^https://.*\\.onrender\\.com$"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"

  - type: web
    name: hlaupatimar-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: hlaupatimar-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: hlaupatimar-db
    plan: free
